<!DOCTYPE html>
<html>
<head>
  <!-- Required for electron wrapper -->
  <base href="./">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="selah">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Selah</title>
  <link rel="manifest" href="manifest.json">

  <!-- Show app icon as background until flutter loads (auto-cleared) -->
  <style>
    body {
      background-image: url('assets/assets/icon.png'); 
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      background-color: #2e2c2c;
      min-width: 100vw;
      max-width: 100vw;
      min-height: 100vh;
      max-height: 100vh;
      margin: 0;
      padding: 0;
    }
  </style>
</head>
<body>
  <!-- Loading text shown over the app image until flutter loads -->
  <h1 id="preloader-text" style="
        position: fixed; 
        top: 10vh; 
        width: 100%; 
        text-align: center; 
        color: white; 
        font-family: sans-serif;
        font-size: 32px;
        text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.9);
        z-index: 100;
    ">
        Loading...
    </h1>

  <script src="flutter_bootstrap.js" async></script>

  <!-- After flutter loads, remove the Loading text that is not auto-removed -->
  <script>
      window.addEventListener('load', function() {
          const text = document.getElementById('preloader-text');
          if (text) {
              text.remove();
          }
      });
    </script>
</body>
</html>
